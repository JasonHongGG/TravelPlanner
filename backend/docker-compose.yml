version: "3.9"

services:
  travel-planner-db:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: node dist/backend/src/dbServer.js
    env_file:
      - ./.env
    environment:
      DB_SERVER_PORT: 3002
    ports:
      - "${DB_SERVER_PORT:-3002}:3002"
    volumes:
      - ../.runtime/backend/data:/app/.runtime/backend/data
      - ../.runtime/backend/logs:/app/.runtime/backend/logs
      # Optional for AI_PROVIDER=vertex when using a local service account key:
      # 1. Store the key outside git, for example ../.runtime/secrets/google-application-credentials.json
      # 2. Set GOOGLE_APPLICATION_CREDENTIALS=/app/.runtime/secrets/google-application-credentials.json in backend/.env
      # 3. Uncomment the mount below. Never bake credentials into the image.
      # - ../.runtime/secrets/google-application-credentials.json:/app/.runtime/secrets/google-application-credentials.json:ro
    restart: unless-stopped
    networks:
      - default
      - hong_service

  travel-planner-copilot:
    build:
      context: ..
      dockerfile: backend/Dockerfile.copilot
    command: node dist/backend/src/copilotServer.js
    env_file:
      - ./.env
    environment:
      COPILOT_SERVER_PORT: 3003
      TZ: ${HOST_TZ}
    ports:
      - "${COPILOT_SERVER_PORT:-3003}:3003"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ../.runtime/backend/data:/app/.runtime/backend/data
      - ../.runtime/backend/logs:/app/.runtime/backend/logs
      - ../.runtime/backend/copilot-logs:/app/.runtime/backend/copilot-logs
    restart: unless-stopped
    networks:
      - default
      - hong_service

  travel-planner-server:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: node dist/backend/src/server.js
    depends_on:
      - travel-planner-db
      - travel-planner-copilot
    env_file:
      - ./.env
    environment:
      PORT: 3001
      DB_SERVER_URL: ${DB_SERVER_URL:-http://travel-planner-db:3002}
      COPILOT_SERVER_URL: ${COPILOT_SERVER_URL:-http://travel-planner-copilot:3003/process}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://travel-planner-frontend,http://localhost:7000,https://travelplanner.alberthongtunnel.dpdns.org}
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - ../.runtime/backend/data:/app/.runtime/backend/data
      - ../.runtime/backend/logs:/app/.runtime/backend/logs
    restart: unless-stopped
    networks:
      - default
      - hong_service

networks:
  hong_service:
    external: true


  
